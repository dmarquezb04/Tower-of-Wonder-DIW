<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower of Wonder - Multimedia</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="multimedia.css">
</head>
<body>

  <!-- Cabecera -->
  <header class="header">
    <a href="index.html" class="enlace-logo">
      <img src="assets/img/logo.png" alt="Tower of Wonder Logo" class="logo-imagen">
    </a>

    <div class="contenedor-menu">
      <ul class="menu-principal">
        <li class="item-navegacion">
          <a href="index.html" class="boton enlace-navegacion">Inicio</a>
        </li>
        <li class="item-navegacion">
          <a href="tienda.html" class="boton enlace-navegacion">Tienda</a>
        </li>
        <li class="item-navegacion">
          <a href="personajes.html" class="boton enlace-navegacion">Personajes</a>
        </li>
        <li class="item-navegacion">
          <a href="noticias.html" class="boton enlace-navegacion">Noticias</a>
        </li>
        <li class="item-navegacion">
          <a href="contacto.html" class="boton enlace-navegacion">Contacto</a>
        </li>
      </ul>
    </div>

    <a href="login.html" class="boton boton-oscuro boton-login">Iniciar sesión</a>
  </header>

  <!-- Contenido Principal -->
  <main class="principal contenido-pagina">
    <div class="contenedor-multimedia">
      <h1 class="titulo-multimedia">Contenido Multimedia</h1>
      
      <section class="seccion-multimedia">
        <h2 class="subtitulo-multimedia">Trailer Oficial</h2>
        <video class="video-player" controls>
          <source src="assets/video.mp4" type="video/mp4">
          Tu navegador no soporta la reproducción de video.
        </video>
      </section>

      <section class="seccion-multimedia">
        <h2 class="subtitulo-multimedia">Banda Sonora Original</h2>
        <audio class="audio-player" controls>
          <source src="assets/audio.mp3" type="audio/mpeg">
          Tu navegador no soporta la reproducción de audio.
        </audio>
      </section>

    </div>
  </main>

  <!-- Pie de página -->
  <footer class="footer">
    <div class="enlaces-redes">
      <a href="https://twitter.com/" target="_blank" rel="noopener noreferrer">
        <img src="assets/img/redes_sociales/twitter.png" alt="Twitter" class="icono-redes">
      </a>
      <a href="https://instagram.com/" target="_blank" rel="noopener noreferrer">
        <img src="assets/img/redes_sociales/instagram.png" alt="Instagram" class="icono-redes">
      </a>
      <a href="https://youtube.com/" target="_blank" rel="noopener noreferrer">
        <img src="assets/img/redes_sociales/youtube.png" alt="YouTube" class="icono-redes">
      </a>
      <a href="https://tiktok.com/" target="_blank" rel="noopener noreferrer">
        <img src="assets/img/redes_sociales/tiktok.png" alt="TikTok" class="icono-redes">
      </a>
      <a href="https://discord.com/" target="_blank" rel="noopener noreferrer">
        <img src="assets/img/redes_sociales/discord.png" alt="Discord" class="icono-redes">
      </a>
    </div>

    <div class="licencia">
      <p class="texto-licencia">
        © 2026 Darío Márquez Bautista — Contenido bajo licencia
        <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer">
          Creative Commons BY-NC-ND 4.0
        </a>
      </p>
    </div>

    <div class="newsletter">
      <form class="formulario-newsletter">
        <input type="email" placeholder="Tu correo para la newsletter..." class="correo-newsletter entrada-texto" required>
        <button type="submit" class="boton boton-dorado boton-newsletter">Suscribirse</button>
      </form>
    </div>
  </footer>

</body>
</html>
